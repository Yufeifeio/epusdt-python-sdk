[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "epusdt-sdk"
version = "0.1.0"
description = "Python SDK for GMWalletApp/epusdt GMPay and EPay integrations"
readme = "README.md"
requires-python = ">=3.8"
license = "MIT"
authors = [
  { name = "Yufeifeio" }
]
keywords = ["epusdt", "gmpay", "epay", "payment", "crypto", "sdk"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Office/Business :: Financial",
]
dependencies = [
  "requests>=2.31,<3",
]

[project.urls]
Homepage = "https://github.com/Yufeifeio/epusdt-python-sdk"
Source = "https://github.com/Yufeifeio/epusdt-python-sdk"
Issues = "https://github.com/Yufeifeio/epusdt-python-sdk/issues"

[project.optional-dependencies]
dev = [
  "build>=1.0",
  "pytest>=8.0",
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
epusdt = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
