name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,qrcode]

      - name: 运行测试（带覆盖率）
        run: pytest -q --cov=epusdt --cov-report=term-missing --cov-fail-under=90

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,qrcode]
          pip install ruff mypy bandit

      - name: ruff
        run: ruff check epusdt tests examples

      - name: mypy
        run: mypy epusdt

      - name: bandit
        run: bandit -r epusdt

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装构建依赖
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: 构建分发包
        run: python -m build

      - name: 检查包元数据
        run: python -m twine check dist/*

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

