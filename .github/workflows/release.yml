name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 发布版本号，例如 0.3.0
        required: true
      publish_pypi:
        description: 是否上传到 PyPI
        required: true
        default: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 校验版本号
        run: |
          python - <<'PY'
          from epusdt import __version__

          expected = "${{ inputs.version }}"
          if __version__ != expected:
              raise SystemExit(f"版本不一致: workflow={expected}, package={__version__}")
          PY

      - name: 运行测试
        run: pytest -q --cov=epusdt --cov-report=term-missing --cov-fail-under=90

      - name: 静态检查
        run: |
          ruff check .
          mypy epusdt
          bandit -r epusdt

      - name: 构建分发包
        run: |
          rm -rf dist
          python -m build

      - name: 检查包元数据
        run: python -m twine check dist/*

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          files: |
            dist/*${{ inputs.version }}*
          generate_release_notes: true

      - name: 上传到 PyPI
        if: ${{ inputs.publish_pypi == 'true' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*${{ inputs.version }}*
